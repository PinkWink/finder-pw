name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            arch: amd64
            artifact_name: linux-amd64
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: ubuntu-22.04-arm
            target: linux
            arch: arm64
            artifact_name: linux-arm64
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - os: macos-latest
            target: macos
            arch: arm64
            artifact_name: macos-arm64
            artifact_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ---------- Linux toolchain ----------
      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            dpkg-dev

      # ---------- macOS toolchain ----------
      - name: Generate icon.icns from PNG (macOS)
        if: matrix.target == 'macos'
        run: |
          mkdir -p icon.iconset
          cp src-tauri/icons/icon.png icon.iconset/icon_512x512.png
          sips -z 256 256 src-tauri/icons/icon.png --out icon.iconset/icon_256x256.png
          sips -z 256 256 src-tauri/icons/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 128 128 src-tauri/icons/icon.png --out icon.iconset/icon_128x128.png
          sips -z 64 64 src-tauri/icons/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 32 32 src-tauri/icons/icon.png --out icon.iconset/icon_32x32.png
          sips -z 32 32 src-tauri/icons/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 16 16 src-tauri/icons/icon.png --out icon.iconset/icon_16x16.png
          iconutil -c icns icon.iconset -o src-tauri/icons/icon.icns
          ls -la src-tauri/icons/icon.icns

      # ---------- Common ----------
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.artifact_name }}

      - name: Install npm dependencies
        run: npm ci

      # ---------- Build ----------
      - name: Build Tauri (Linux .deb + AppImage)
        if: matrix.target == 'linux'
        run: npm run tauri -- build --bundles deb,appimage

      - name: Build Tauri (macOS .dmg)
        if: matrix.target == 'macos'
        run: npm run tauri -- build --bundles dmg,app
        env:
          # Skip codesigning (no Apple Developer cert configured yet)
          APPLE_SIGNING_IDENTITY: "-"

      # ---------- Workflow artifacts (for downstream apt-repo publish) ----------
      - name: Stage Linux .deb for apt-repo job
        if: matrix.target == 'linux'
        run: |
          mkdir -p staging-deb
          cp src-tauri/target/release/bundle/deb/*.deb staging-deb/

      - name: Upload Linux .deb as workflow artifact
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-deb
          path: staging-deb/
          retention-days: 7

      # ---------- Release upload ----------
      - name: Upload artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          generate_release_notes: true
          fail_on_unmatched_files: false

  publish-apt:
    name: Publish APT repo (multi-arch)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source (for scripts)
        uses: actions/checkout@v4

      - name: Install apt-repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg

      - name: Download amd64 .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64-deb
          path: debs/amd64

      - name: Download arm64 .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-deb
          path: debs/arm64

      - name: Checkout existing apt-repo (gh-pages branch)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: apt-repo
        continue-on-error: true

      - name: Initialize empty repo if first run
        run: mkdir -p apt-repo

      - name: Drop stale 'finder' packages (post-rename to PWFinder)
        run: rm -rf apt-repo/pool/main/f || true

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys

      - name: Build/update APT repo
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./scripts/build-apt-repo.sh apt-repo \
            debs/amd64/*.deb \
            debs/arm64/*.deb

      - name: Replace placeholders in index.html
        run: |
          PAGE_URL="${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          GH_REPO="${{ github.repository }}"
          sed -i "s|__PAGE_URL__|$PAGE_URL|g; s|__GH_REPO__|$GH_REPO|g" apt-repo/index.html

      - name: Publish apt-repo to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-repo
          publish_branch: gh-pages
          keep_files: false
          commit_message: "Publish ${{ github.ref_name }}"
